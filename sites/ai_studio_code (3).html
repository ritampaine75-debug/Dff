<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport settings for mobile-responsiveness and preventing unwanted zooming -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real-Time GPS Tracker</title>

    <!-- Leaflet CSS via CDN -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

    <style>
        /* CSS Reset and base styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
        }

        /* Status Bar Styles */
        #status-bar {
            padding: 15px 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            background-color: #f39c12; /* Default: Waiting (Orange) */
            transition: background-color 0.3s ease;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        #status-bar.active { background-color: #27ae60; } /* Success (Green) */
        #status-bar.error { background-color: #c0392b; }  /* Error (Red) */

        /* Map Container */
        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 1; /* Keep below status and coordinate bars */
        }

        /* Coordinates Panel Styles */
        #coordinates-panel {
            padding: 15px 10px;
            background-color: #1a252f;
            color: #ecf0f1;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            flex-shrink: 0;
            z-index: 1000;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .coord-group {
            margin: 5px;
        }

        .coord-label {
            color: #bdc3c7;
            font-size: 0.9rem;
        }

        .coord-value {
            font-weight: bold;
            color: #3498db;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <!-- UI Elements -->
    <div id="status-bar">Waiting for permission...</div>
    <div id="map"></div>
    <div id="coordinates-panel">
        <div class="coord-group">
            <span class="coord-label">LAT:</span> 
            <span id="lat-display" class="coord-value">--.------</span>
        </div>
        <div class="coord-group">
            <span class="coord-label">LNG:</span> 
            <span id="lng-display" class="coord-value">--.------</span>
        </div>
    </div>

    <!-- Leaflet JS via CDN -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- Application Logic -->
    <script>
        // DOM Elements
        const statusBar = document.getElementById('status-bar');
        const latDisplay = document.getElementById('lat-display');
        const lngDisplay = document.getElementById('lng-display');

        // Map variables
        let map = null;
        let userMarker = null;

        // Automatically trigger when page loads
        window.onload = () => {
            startTracking();
        };

        function startTracking() {
            // Check if browser supports Geolocation
            if ("geolocation" in navigator) {
                statusBar.textContent = "Requesting GPS permissions...";
                
                // WatchPosition runs continuously as the user moves
                navigator.geolocation.watchPosition(
                    updatePosition, 
                    handleError, 
                    {
                        enableHighAccuracy: true, // Forces GPS over Wi-Fi/IP when available
                        maximumAge: 0,            // Do not use cached positions
                        timeout: 10000            // Wait up to 10 seconds for a response
                    }
                );
            } else {
                showError("Geolocation is not supported by your browser.");
            }
        }

        function updatePosition(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = Math.round(position.coords.accuracy);

            // 1. Update UI Text
            statusBar.textContent = `Tracking active (Accuracy: ±${accuracy}m)`;
            statusBar.className = 'active'; // Turns bar green
            
            latDisplay.textContent = lat.toFixed(6);
            lngDisplay.textContent = lng.toFixed(6);

            // 2. Initialize or Update Map
            if (!map) {
                // First time getting location: Setup map
                map = L.map('map').setView([lat, lng], 16);

                // Add OpenStreetMap tiles
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);

                // Create marker at user's location
                userMarker = L.marker([lat, lng]).addTo(map);
            } else {
                // Map exists: Update marker position and center map
                userMarker.setLatLng([lat, lng]);
                map.setView([lat, lng]); // Keeps map centered on user
            }
        }

        function handleError(error) {
            let errorMessage = "An unknown error occurred.";
            
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    errorMessage = "Permission denied. Please allow location access in your browser.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    errorMessage = "Location information is currently unavailable.";
                    break;
                case error.TIMEOUT:
                    errorMessage = "The request to get your location timed out.";
                    break;
            }
            
            showError(errorMessage);
        }

        function showError(message) {
            statusBar.textContent = message;
            statusBar.className = 'error'; // Turns bar red
        }
    </script>
</body>
</html>
