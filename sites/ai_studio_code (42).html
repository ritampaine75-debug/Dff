<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ProChat Secure</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #1c1c1e; }
        .ios-blur { backdrop-filter: blur(25px) saturate(180%); background-color: rgba(255, 255, 255, 0.75); }
        .bg-chat { background-color: #f2f2f7; }
        .bubble-out { background-color: #007aff; color: white; border-radius: 20px 20px 4px 20px; }
        .bubble-in { background-color: #e5e5ea; color: #1c1c1e; border-radius: 20px 20px 20px 4px; }
        .link-preview-card { background: rgba(0,0,0,0.05); border-left: 3px solid #007aff; border-radius: 8px; margin-top: 8px; overflow: hidden; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="screen-auth" class="flex items-center justify-center min-h-screen px-6">
        <div class="w-full max-w-sm">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl shadow-xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                </div>
                <h1 class="text-3xl font-bold tracking-tight">ProChat</h1>
                <p class="text-gray-500">End-to-End Encrypted</p>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 space-y-4">
                <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl outline-none transition focus:ring-2 ring-blue-500/20 border-none">
                <input type="password" id="auth-password" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl outline-none transition focus:ring-2 ring-blue-500/20 border-none">
                <button id="btn-email-auth" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-semibold shadow-lg shadow-blue-500/30 hover:bg-blue-700 active:scale-95 transition">Sign In</button>
                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-100"></div>
                    <span class="flex-shrink mx-4 text-gray-400 text-xs">OR</span>
                    <div class="flex-grow border-t border-gray-100"></div>
                </div>
                <button id="btn-google-auth" class="w-full bg-white border border-gray-200 py-3 rounded-2xl font-medium flex items-center justify-center gap-3 active:scale-95 transition">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> Google Account
                </button>
            </div>
            <p id="auth-error" class="text-red-500 text-center text-xs mt-4"></p>
        </div>
    </div>

    <!-- CHATS LIST SCREEN -->
    <div id="screen-main" class="hidden h-screen flex flex-col max-w-lg mx-auto bg-white shadow-2xl">
        <header class="ios-blur sticky top-0 z-10 px-6 pt-12 pb-4">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-extrabold tracking-tight">Messages</h1>
                <button id="btn-logout" class="text-blue-600 font-medium">Log out</button>
            </div>
            <div class="relative">
                <input type="text" id="search-input" placeholder="Search by email..." class="w-full p-3 pl-10 bg-gray-100 rounded-xl outline-none text-sm border-none">
                <svg class="w-4 h-4 absolute left-3 top-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <button id="btn-add-friend" class="absolute right-3 top-2 text-blue-600 font-bold text-sm bg-blue-50 px-2 py-1 rounded-lg">Add</button>
            </div>
        </header>
        
        <div id="contact-list" class="flex-1 overflow-y-auto px-2 pb-20">
            <!-- Dynamic contacts -->
        </div>
    </div>

    <!-- CHAT VIEW SCREEN -->
    <div id="screen-chat" class="hidden fixed inset-0 z-20 flex flex-col bg-chat max-w-lg mx-auto shadow-2xl">
        <header class="ios-blur px-4 pt-12 pb-3 border-b border-gray-200 flex items-center shadow-sm">
            <button id="btn-back" class="text-blue-600 flex items-center font-medium mr-2">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="flex items-center">
                <div id="active-avatar" class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-bold mr-3 shadow-md">?</div>
                <div>
                    <h2 id="active-name" class="font-bold text-sm">Loading...</h2>
                    <div class="flex items-center gap-1">
                        <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] text-gray-500 uppercase tracking-tighter">Encrypted Session</span>
                    </div>
                </div>
            </div>
        </header>

        <div id="message-list" class="flex-1 overflow-y-auto p-4 space-y-3">
            <!-- Messages -->
        </div>

        <div class="p-4 ios-blur border-t border-gray-200 pb-10">
            <div class="flex items-end gap-2">
                <div class="flex-1 bg-white rounded-[24px] px-4 py-2 flex items-end border border-gray-200">
                    <textarea id="msg-input" placeholder="Message" rows="1" class="flex-1 max-h-32 py-1 outline-none text-[15px] resize-none"></textarea>
                </div>
                <button id="btn-send" class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
                    <svg class="w-5 h-5 text-white transform rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDUHXK7NYeM6CLNN4fsyGVz1MpIVpJuOq0",
            authDomain: "studio-vddd5.firebaseapp.com",
            databaseURL: "https://studio-vddd5-default-rtdb.firebaseio.com",
            projectId: "studio-vddd5",
            storageBucket: "studio-vddd5.firebasestorage.app",
            messagingSenderId: "679230106233",
            appId: "1:679230106233:web:3d6a91cabc2264e15902a8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let me = null;
        let activeFriend = null;
        let currentE2EEKey = null;
        let currentConvId = null;

        // --- AUTH ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                me = { uid: user.uid, email: user.email, name: user.displayName || user.email.split('@')[0] };
                await set(ref(db, `users/${user.uid}`), me);
                switchScreen('screen-main');
                loadContacts();
            } else {
                switchScreen('screen-auth');
            }
        });

        document.getElementById('btn-email-auth').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            if (!email || !pass) return;
            
            const hash = CryptoJS.SHA256(pass).toString();
            const safeId = btoa(email).replace(/=/g, "");
            const snap = await get(ref(db, `users/${safeId}`));

            if (snap.exists() && snap.val().password !== hash) {
                document.getElementById('auth-error').innerText = "Security check failed.";
            } else {
                if (!snap.exists()) await set(ref(db, `users/${safeId}`), { uid: safeId, email, name: email.split('@')[0], password: hash });
                me = { uid: safeId, email, name: email.split('@')[0] };
                switchScreen('screen-main');
                loadContacts();
            }
        };

        document.getElementById('btn-google-auth').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());

        // --- CONTACT MANAGEMENT ---
        document.getElementById('btn-add-friend').onclick = async () => {
            const email = document.getElementById('search-input').value.trim();
            if (!email) return;

            const usersSnap = await get(ref(db, 'users'));
            let target = null;
            usersSnap.forEach(u => { if(u.val().email === email) target = u.val(); });

            if (target && target.uid !== me.uid) {
                await set(ref(db, `friends/${me.uid}/${target.uid}`), target);
                await set(ref(db, `friends/${target.uid}/${me.uid}`), me);
                document.getElementById('search-input').value = "";
            } else {
                alert("Profile not found.");
            }
        };

        function loadContacts() {
            onValue(ref(db, `friends/${me.uid}`), (snap) => {
                const list = document.getElementById('contact-list');
                list.innerHTML = "";
                snap.forEach(child => {
                    const friend = child.val();
                    const el = document.createElement('div');
                    el.className = "flex items-center p-4 hover:bg-gray-50 cursor-pointer transition active:scale-95";
                    el.innerHTML = `
                        <div class="w-14 h-14 bg-gray-100 rounded-full flex items-center justify-center font-bold text-gray-400 mr-4 shadow-inner text-xl">${friend.name[0].toUpperCase()}</div>
                        <div class="flex-1 border-b border-gray-100 pb-4 h-full">
                            <h3 class="font-semibold text-lg">${friend.name}</h3>
                            <p class="text-xs text-gray-400 truncate w-48">Tap to start secure chat</p>
                        </div>
                    `;
                    el.onclick = () => openChat(friend);
                    list.appendChild(el);
                });
            });
        }

        // --- CHAT & E2EE LOGIC ---
        function openChat(friend) {
            activeFriend = friend;
            currentConvId = me.uid < friend.uid ? `${me.uid}_${friend.uid}` : `${friend.uid}_${me.uid}`;
            currentE2EEKey = CryptoJS.HmacSHA256(currentConvId, "pro-chat-v1-salt").toString();

            document.getElementById('active-name').innerText = friend.name;
            document.getElementById('active-avatar').innerText = friend.name[0].toUpperCase();
            switchScreen('screen-chat');
            loadMessages();
        }

        document.getElementById('btn-send').onclick = sendMessage;
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;

            const encrypted = CryptoJS.AES.encrypt(input.value, currentE2EEKey).toString();
            push(ref(db, `messages/${currentConvId}`), {
                sid: me.uid,
                body: encrypted,
                ts: Date.now()
            });
            input.value = "";
        }

        function loadMessages() {
            onValue(ref(db, `messages/${currentConvId}`), (snap) => {
                const container = document.getElementById('message-list');
                container.innerHTML = "";
                snap.forEach(c => {
                    const msg = c.val();
                    let decrypted = "---";
                    try {
                        decrypted = CryptoJS.AES.decrypt(msg.body, currentE2EEKey).toString(CryptoJS.enc.Utf8);
                    } catch (e) {}

                    const isMe = msg.sid === me.uid;
                    const preview = extractPreview(decrypted);

                    container.innerHTML += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="max-w-[85%] px-4 py-2 shadow-sm ${isMe ? 'bubble-out' : 'bubble-in'}">
                                <p class="text-[15px] whitespace-pre-wrap">${decrypted}</p>
                                ${preview}
                                <p class="text-[9px] mt-1 opacity-50 text-right">${new Date(msg.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                            </div>
                        </div>
                    `;
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        // --- LINK PREVIEW ENGINE ---
        function extractPreview(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const match = text.match(urlRegex);
            if (!match) return "";

            try {
                const url = new URL(match[0]);
                const domain = url.hostname;
                return `
                    <div class="link-preview-card bg-black/10 p-2 text-xs">
                        <div class="flex items-center gap-2">
                            <img src="https://www.google.com/s2/favicons?sz=64&domain=${domain}" class="w-4 h-4 rounded">
                            <span class="font-bold opacity-70 uppercase tracking-widest text-[9px]">${domain}</span>
                        </div>
                        <p class="mt-1 opacity-60">Tap to open secure link</p>
                        <a href="${match[0]}" target="_blank" class="absolute inset-0 z-10"></a>
                    </div>
                `;
            } catch (e) { return ""; }
        }

        // --- UTILS ---
        function switchScreen(id) {
            ['screen-auth', 'screen-main', 'screen-chat'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        document.getElementById('btn-back').onclick = () => switchScreen('screen-main');
    </script>
</body>
</html>
