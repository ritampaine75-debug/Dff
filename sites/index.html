<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অটোমেটিক লাইভ লোকেশন</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        #map { height: 400px; width: 90%; margin: 20px auto; border: 2px solid #333; border-radius: 10px; }
        .info { font-size: 18px; color: #555; margin-top: 15px; }
        #status { font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>

    <h1>আমার লাইভ জিপিএস ট্র্যাকার</h1>
    
    <p class="info" id="status">লোকেশন পারমিশনের জন্য অপেক্ষা করা হচ্ছে...</p>

    <div id="map"></div>
    <p id="coordinates" class="info"></p>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, marker;

        // পেজ লোড হওয়ার সাথে সাথেই এই ফাংশনটি রান করবে
        window.onload = function() {
            if (navigator.geolocation) {
                // watchPosition কল করা হলো যাতে অটোমেটিক পারমিশন চায়
                navigator.geolocation.watchPosition(showPosition, showError, {
                    enableHighAccuracy: true, // একদম সঠিক জিপিএস লোকেশনের জন্য
                    timeout: 10000,
                    maximumAge: 0
                });
            } else {
                document.getElementById("status").innerText = "আপনার ব্রাউজার লোকেশন সাপোর্ট করে না।";
            }
        };

        function showPosition(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            // স্ট্যাটাস টেক্সট আপডেট করা
            document.getElementById("status").innerText = "আপনার লাইভ লোকেশন ট্র্যাক করা হচ্ছে!";
            document.getElementById("status").style.color = "green";

            // টেক্সট হিসেবে কোঅর্ডিনেট দেখানো
            document.getElementById("coordinates").innerHTML = 
                "অক্ষাংশ (Latitude): " + lat + "<br>দ্রাঘিমাংশ (Longitude): " + lng;

            // ম্যাপ সেটআপ করা
            if (!map) {
                map = L.map('map').setView([lat, lng], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                marker = L.marker([lat, lng]).addTo(map).bindPopup("আপনি এখানে আছেন").openPopup();
            } else {
                // ম্যাপের মার্কার আপডেট করা
                marker.setLatLng([lat, lng]);
                map.setView([lat, lng]);
            }
        }

        function showError(error) {
            let statusText = document.getElementById("status");
            statusText.style.color = "red";
            
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    statusText.innerText = "আপনি লোকেশন পারমিশন দেননি। দয়া করে ব্রাউজার থেকে পারমিশন দিন এবং পেজটি রিফ্রেশ করুন।";
                    break;
                case error.POSITION_UNAVAILABLE:
                    statusText.innerText = "লোকেশন তথ্য পাওয়া যাচ্ছে না। আপনার ডিভাইসের Location/GPS অন আছে কিনা চেক করুন।";
                    break;
                case error.TIMEOUT:
                    statusText.innerText = "লোকেশন রিকোয়েস্ট টাইমআউট হয়েছে।";
                    break;
                default:
                    statusText.innerText = "অজানা সমস্যা হয়েছে।";
            }
        }
    </script>
</body>
</html>
