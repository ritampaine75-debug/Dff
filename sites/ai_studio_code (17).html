<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled 3D Earth</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        canvas { display: block; }
        #video { display: none; /* Hide the raw webcam feed */ }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            pointer-events: none;
        }
        #status { color: #00ff00; font-weight: bold; }
    </style>
    <!-- Import Maps for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="ui">
        <h2>Gesture Earth Controller</h2>
        <p>Status: <span id="status">Loading AI...</span></p>
        <ul>
            <li>🖐️ <b>Move Index Finger:</b> Rotate Earth</li>
            <li>🤏 <b>Pinch Index & Thumb:</b> Zoom In/Out</li>
        </ul>
    </div>

    <!-- Video element for webcam -->
    <video id="video" autoplay playsinline></video>

    <!-- Main Logic -->
    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js";

        // --- 1. SET UP 3D EARTH (THREE.JS) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Add lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(5, 3, 5);
        scene.add(pointLight);

        // Create Earth Sphere
        const geometry = new THREE.SphereGeometry(2, 64, 64);
        const textureLoader = new THREE.TextureLoader();
        // High-res earth texture from unpkg
        const earthTexture = textureLoader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
        const material = new THREE.MeshStandardMaterial({ map: earthTexture });
        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 2. SET UP GESTURE TRACKING (MEDIAPIPE) ---
        let handLandmarker = undefined;
        let webcamRunning = false;
        const video = document.getElementById("video");
        const statusText = document.getElementById("status");

        async function createHandLandmarker() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
            startWebcam();
        }

        function startWebcam() {
            navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
                statusText.innerText = "Tracking Active! Show your hand.";
            }).catch(err => {
                statusText.innerText = "Webcam access denied.";
                statusText.style.color = "red";
            });
        }

        // --- 3. MAP GESTURES TO EARTH MOVEMENT ---
        let lastX = 0, lastY = 0;
        let isTracking = false;
        let lastTime = -1;

        async function predictWebcam() {
            let startTimeMs = performance.now();
            if (lastTime !== startTimeMs) {
                lastTime = startTimeMs;
                const results = handLandmarker.detectForVideo(video, startTimeMs);

                if (results.landmarks.length > 0) {
                    const hand = results.landmarks[0];
                    
                    // Landmark 8 is Index Finger Tip, 4 is Thumb Tip
                    const indexFinger = hand[8];
                    const thumb = hand[4];

                    // --- ROTATION LOGIC ---
                    if (!isTracking) {
                        lastX = indexFinger.x;
                        lastY = indexFinger.y;
                        isTracking = true;
                    } else {
                        // Calculate how much the finger moved
                        const deltaX = indexFinger.x - lastX;
                        const deltaY = indexFinger.y - lastY;

                        // Rotate Earth (multiplier adjusts sensitivity)
                        earth.rotation.y += deltaX * 3.0; 
                        earth.rotation.x += deltaY * 3.0;

                        lastX = indexFinger.x;
                        lastY = indexFinger.y;
                    }

                    // --- ZOOM LOGIC (PINCH) ---
                    // Calculate distance between thumb and index finger
                    const pinchDistance = Math.hypot(indexFinger.x - thumb.x, indexFinger.y - thumb.y);
                    
                    // Map pinch distance to camera zoom (closer pinch = zoom out, wide pinch = zoom in)
                    // Normal pinch range is ~0.02 (closed) to ~0.2 (open)
                    const targetZoom = 10 - (pinchDistance * 30); 
                    // Smoothly transition camera position
                    camera.position.z += (targetZoom - camera.position.z) * 0.1;
                    
                    // Clamp zoom so you don't go inside the earth
                    if(camera.position.z < 2.5) camera.position.z = 2.5; 
                    if(camera.position.z > 10) camera.position.z = 10;

                } else {
                    isTracking = false;
                    // Auto-spin slowly when no hand is detected
                    earth.rotation.y += 0.002;
                }
            }
            
            renderer.render(scene, camera);
            window.requestAnimationFrame(predictWebcam);
        }

        // Start the AI
        createHandLandmarker();

    </script>
</body>
</html>
