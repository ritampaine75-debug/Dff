<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fully Working E2EE Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <!-- LOGIN SCREEN -->
    <div id="auth-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
            <h2 class="text-3xl font-black mb-8 text-center text-indigo-400">SECURE CHAT</h2>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-3 bg-slate-700 rounded-lg outline-none focus:ring-2 ring-indigo-500 text-white">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 bg-slate-700 rounded-lg outline-none focus:ring-2 ring-indigo-500 text-white">
                
                <button id="btn-email-login" class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-lg font-bold transition duration-200">
                    Login / Create Account
                </button>
                
                <div class="flex items-center my-4">
                    <hr class="flex-1 border-slate-600">
                    <span class="px-3 text-slate-500 text-sm">OR</span>
                    <hr class="flex-1 border-slate-600">
                </div>

                <button id="btn-google" class="w-full bg-white text-black p-3 rounded-lg font-bold flex items-center justify-center hover:bg-gray-200 transition duration-200">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 mr-2"> Sign in with Google
                </button>
            </div>
            <p id="error-msg" class="text-red-400 text-sm mt-4 text-center"></p>
        </div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat-screen" class="hidden flex flex-col h-screen max-w-4xl mx-auto shadow-2xl border-x border-slate-800 bg-slate-900">
        <!-- Header -->
        <div class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center">
            <div>
                <h3 id="user-display" class="font-bold text-indigo-400">User</h3>
                <div class="flex items-center gap-2 mt-1">
                    <span class="text-[10px] text-slate-400 uppercase tracking-widest">E2EE Key:</span>
                    <input type="password" id="secret-key" value="chat123" class="bg-slate-700 text-[10px] px-2 py-0.5 rounded border border-slate-600 outline-none">
                </div>
            </div>
            <button id="btn-logout" class="text-xs bg-slate-700 px-3 py-1 rounded hover:bg-red-900 transition">Logout</button>
        </div>

        <!-- Messages Area -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar"></div>

        <!-- Input Area -->
        <div class="p-4 bg-slate-800 border-t border-slate-700 flex gap-2">
            <input type="text" id="msg-input" placeholder="Write an encrypted message..." class="flex-1 bg-slate-700 p-3 rounded-lg outline-none focus:ring-2 ring-indigo-500">
            <button id="btn-send" class="bg-indigo-600 px-6 py-2 rounded-lg font-bold hover:bg-indigo-500">Send</button>
        </div>
    </div>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDUHXK7NYeM6CLNN4fsyGVz1MpIVpJuOq0",
            authDomain: "studio-vddd5.firebaseapp.com",
            databaseURL: "https://studio-vddd5-default-rtdb.firebaseio.com",
            projectId: "studio-vddd5",
            storageBucket: "studio-vddd5.firebasestorage.app",
            messagingSenderId: "679230106233",
            appId: "1:679230106233:web:3d6a91cabc2264e15902a8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let sessionUser = null;

        // --- AUTH LOGIC ---

        // Manual Email/Password with RTDB Storage & Hashing
        document.getElementById('btn-email-login').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (!email || !password) {
                errorMsg.innerText = "Please fill all fields";
                return;
            }

            // 1. Hash the password
            const hashedPassword = CryptoJS.SHA256(password).toString();
            // 2. Create a safe DB key from email (replace dots)
            const dbKey = email.replace(/\./g, ',');

            try {
                const userRef = ref(db, 'users/' + dbKey);
                const snapshot = await get(userRef);

                if (snapshot.exists()) {
                    // Check Password
                    if (snapshot.val().password === hashedPassword) {
                        loginToUI({ displayName: email, email: email });
                    } else {
                        errorMsg.innerText = "Incorrect password!";
                    }
                } else {
                    // Register User
                    await set(userRef, { email: email, password: hashedPassword });
                    loginToUI({ displayName: email, email: email });
                }
            } catch (e) {
                errorMsg.innerText = "Error: " + e.message;
            }
        });

        // Google Login
        document.getElementById('btn-google').onclick = () => {
            signInWithPopup(auth, provider)
                .then((result) => loginToUI(result.user))
                .catch((error) => alert(error.message));
        };

        // UI Switcher
        function loginToUI(user) {
            sessionUser = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.displayName || user.email;
            initChat();
        }

        document.getElementById('btn-logout').onclick = () => location.reload();

        // --- CHAT & E2EE LOGIC ---

        function initChat() {
            const msgList = document.getElementById('chat-messages');
            const msgInput = document.getElementById('msg-input');
            const secretKeyInput = document.getElementById('secret-key');

            // Send Message
            document.getElementById('btn-send').onclick = () => {
                const rawText = msgInput.value;
                const encryptionKey = secretKeyInput.value;

                if (!rawText || !encryptionKey) return;

                // E2EE: Encrypt before sending
                const encrypted = CryptoJS.AES.encrypt(rawText, encryptionKey).toString();

                push(ref(db, 'messages'), {
                    sender: sessionUser.displayName || sessionUser.email,
                    content: encrypted,
                    timestamp: Date.now()
                });

                msgInput.value = "";
            };

            // Listen for Messages
            onValue(ref(db, 'messages'), (snapshot) => {
                msgList.innerHTML = "";
                const data = snapshot.val();
                const encryptionKey = secretKeyInput.value;

                for (let id in data) {
                    const msg = data[id];
                    let displayContent = "";

                    try {
                        // E2EE: Decrypt locally
                        const bytes = CryptoJS.AES.decrypt(msg.content, encryptionKey);
                        displayContent = bytes.toString(CryptoJS.enc.Utf8);
                        
                        if (!displayContent) throw new Error();
                    } catch (e) {
                        displayContent = " [ENCRYPTED - Wrong Key] ";
                    }

                    const isMe = msg.sender === (sessionUser.displayName || sessionUser.email);
                    
                    msgList.innerHTML += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="${isMe ? 'bg-indigo-600' : 'bg-slate-800 border border-slate-700'} p-3 rounded-2xl max-w-[80%]">
                                <p class="text-[10px] text-indigo-300 font-bold mb-1">${msg.sender}</p>
                                <p class="text-sm">${displayContent}</p>
                            </div>
                        </div>
                    `;
                }
                msgList.scrollTop = msgList.scrollHeight;
            });

            // Re-render messages if user changes key
            secretKeyInput.addEventListener('input', () => {
                // Trigger a refresh of the message display
                onValue(ref(db, 'messages'), () => {}, {onlyOnce: true});
            });
        }

    </script>
</body>
</html>
