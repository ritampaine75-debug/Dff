        /* GATEKEEPER CAPTCHA */
        #captcha-gate { position:fixed; inset:0; background:#000; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .gate-box { background:var(--panel); padding:40px; border:1px solid #222; text-align:center; border-radius:10px; box-shadow:0 0 50px rgba(255,0,0,0.1); }
        input { background:#000; border:1px solid #444; color:var(--red); padding:10px; margin:10px 0; text-align:center; font-size:1.5rem; width:200px; }
        
        /* CORE SYSTEM */
        .header { position:fixed; top:0; width:100%; height:50px; background:rgba(0,0,0,0.85); display:flex; justify-content:space-between; align-items:center; padding:0 20px; z-index:1000; border-bottom:1px solid #111; box-sizing:border-box;}
        #timer-display { color:var(--red); font-weight:bold; font-size:1.2rem; background:#1a0000; padding:2px 10px; border:1px solid #400; border-radius:5px;}
        
        .swiper { width:100%; height:100vh; z-index:1; }
        .content-box { position:relative; width:100%; height:100%; display:flex; justify-content:center; align-items:center; overflow:hidden; }
        
        /* SECURITY UI */
        .photo-frame { position:relative; max-width:100%; max-height:100%; display:none; opacity:0; transition: opacity 0.5s;}
        .photo-active { display:block !important; opacity:1 !important; }
        img { max-width:100%; max-height:100vh; object-fit:contain; filter: brightness(0.9); pointer-events:none; }

        /* THE 100% SHIELD */
        .shield { position:absolute; top:0; left:0; width:100%; height:100%; z-index:500; background:rgba(0,0,0,0); cursor:not-allowed; }
        
        /* GRID WATERMARK */
        .wm-layer { position:absolute; inset:0; z-index:400; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(5,1fr); pointer-events:none; opacity:0.35; }
        .wm-txt { display:flex; justify-content:center; align-items:center; transform:rotate(-40deg); color:#fff; font-size:1.4rem; font-weight:900; }

        /* ANTI-SCREENSHOT/LEAVE TAB */
        .flash-overlay { position:fixed; inset:0; background:#000; z-index:2000; display:none; justify-content:center; align-items:center; text-align:center;}
    </style>
</head>

                        destroySlide(this.activeIndex - 1);
                    },
                    init: function() {

                    }

        function handlePhotoLife(index) {
            clearTimeout(slideTimer);
            let time = 10;
            const imgEl = document.getElementById(`img-${index}`);
            const frame = document.getElementById(`frame-${index}`);
            const loadTxt = document.getElementById(`load-${index}`);

            // DECOMPRESS & SHOW

            frame.classList.add('photo-active');
            if(loadTxt) loadTxt.style.display = 'none';

            countUI.innerText = `${d.length - index} ASSETS REMAINING`;

            slideTimer = setInterval(() => {
                time--;
                timerUI.innerText = `TIME: ${time < 10 ? '0'+time : time}S`;
                
                if(time <= 0) {
                    clearInterval(slideTimer);
                    nuke(index);
                }
            }, 1000);
        }

        function nuke(index) {
            const frame = document.getElementById(`frame-${index}`);
            if(frame) {
                frame.innerHTML = '<h1 style="color:red">EXPIRED / PURGED</h1>';
                timerUI.innerText = "TIME: 00S";
            }
        }

        function destroySlide(index) {
            if (index < 0) return;
            const prevBox = document.getElementById(`box-${index}`);
            if(prevBox) {
                prevBox.innerHTML = ''; // PERMANENT WIPE FROM DOM
                console.log(`Resource ${index} purged from memory.`);
            }
        }
