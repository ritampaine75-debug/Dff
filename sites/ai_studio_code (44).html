<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPipe Face Analysis - Fixed</title>
    
    <!-- Legacy MediaPipe Libraries (Most stable for single HTML files) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }
        @media (max-width: 800px) { .app-container { grid-template-columns: 1fr; } }

        /* Video Styling */
        .video-box { position: relative; border-radius: 10px; overflow: hidden; background: #000; aspect-ratio: 4/3; }
        #input_video { display: none; }
        #output_canvas { width: 100%; height: 100%; transform: scaleX(-1); } /* Mirror effect */

        /* UI Elements */
        h2 { color: #4ecca3; margin-bottom: 10px; font-size: 1.2rem; }
        .stats-panel { background: #0f3460; padding: 15px; border-radius: 10px; }
        .stat-item { 
            display: flex; justify-content: space-between; 
            padding: 8px 0; border-bottom: 1px solid #1a1a2e; font-size: 14px;
        }
        .stat-value { color: #4ecca3; font-weight: bold; }

        .btn-start {
            width: 100%; padding: 15px; margin-top: 10px;
            background: #4ecca3; border: none; border-radius: 5px;
            color: #1a1a2e; font-weight: bold; cursor: pointer;
        }
        
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a2e; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #0f3460;
            border-top: 5px solid #4ecca3; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px;">Initializing Face AI...</p>
    </div>

    <div class="app-container">
        <!-- Left: Video -->
        <div>
            <h2>LIVE CAMERA FEED</h2>
            <div class="video-box">
                <video id="input_video"></video>
                <canvas id="output_canvas"></canvas>
            </div>
            <button class="btn-start" onclick="toggleCamera()">START ANALYSIS</button>
        </div>

        <!-- Right: Stats -->
        <div class="stats-panel">
            <h2>ANALYSIS DATA</h2>
            <div class="stat-item">
                <span>Face Detected:</span>
                <span class="stat-value" id="isFace">No</span>
            </div>
            <div class="stat-item">
                <span>Confidence:</span>
                <span class="stat-value" id="confidence">0%</span>
            </div>
            <div class="stat-item">
                <span>Face Center X:</span>
                <span class="stat-value" id="posX">--</span>
            </div>
            <div class="stat-item">
                <span>Face Center Y:</span>
                <span class="stat-value" id="posY">--</span>
            </div>
            
            <h2 style="margin-top: 20px;">KEYPOINTS</h2>
            <div id="keypointList">
                <div class="stat-item"><span>Left Eye:</span> <span id="kp1" class="stat-value">--</span></div>
                <div class="stat-item"><span>Right Eye:</span> <span id="kp0" class="stat-value">--</span></div>
                <div class="stat-item"><span>Nose:</span> <span id="kp2" class="stat-value">--</span></div>
                <div class="stat-item"><span>Mouth:</span> <span id="kp3" class="stat-value">--</span></div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loader = document.getElementById('loader');

        let cameraStarted = false;
        let cameraObj = null;

        function onResults(results) {
            // Hide loader once results start coming
            loader.style.display = 'none';

            // Draw Video Frame
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.detections.length > 0) {
                const detection = results.detections[0];
                document.getElementById('isFace').textContent = "Yes";
                document.getElementById('confidence').textContent = Math.round(detection.score[0] * 100) + "%";

                // Draw Detection Box
                drawRectangle(canvasCtx, detection.boundingBox, {color: '#4ecca3', lineWidth: 4});
                
                // Draw Landmarks
                drawConnectors(canvasCtx, detection.landmarks, null, {color: '#4ecca3', lineWidth: 2});

                // Update Stats
                const box = detection.boundingBox;
                document.getElementById('posX').textContent = Math.round((box.xCenter * 100)) + "%";
                document.getElementById('posY').textContent = Math.round((box.yCenter * 100)) + "%";

                // Update Keypoints (Indices: 0:R-Eye, 1:L-Eye, 2:Nose, 3:Mouth)
                const landmarks = detection.landmarks;
                document.getElementById('kp0').textContent = Math.round(landmarks[0].x * 100) + "%";
                document.getElementById('kp1').textContent = Math.round(landmarks[1].x * 100) + "%";
                document.getElementById('kp2').textContent = Math.round(landmarks[2].x * 100) + "%";
                document.getElementById('kp3').textContent = Math.round(landmarks[3].x * 100) + "%";
            } else {
                document.getElementById('isFace').textContent = "No";
                document.getElementById('confidence').textContent = "0%";
            }
            canvasCtx.restore();
        }

        const faceDetection = new FaceDetection({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
        });

        faceDetection.setOptions({
            model: 'short',
            minDetectionConfidence: 0.5
        });

        faceDetection.onResults(onResults);

        function toggleCamera() {
            if (!cameraStarted) {
                cameraObj = new Camera(videoElement, {
                    onFrame: async () => {
                        await faceDetection.send({image: videoElement});
                    },
                    width: 640,
                    height: 480
                });
                cameraObj.start();
                cameraStarted = true;
                document.querySelector('.btn-start').textContent = "ANALYSIS RUNNING...";
                document.querySelector('.btn-start').style.background = "#0f3460";
                document.querySelector('.btn-start').style.color = "white";
            }
        }

        // Emergency loader hide if failed to connect in 10 seconds
        setTimeout(() => {
            if(loader.style.display !== 'none') {
                loader.innerHTML = "<p>Taking too long? <br> Make sure you are using <b>HTTPS</b> or <b>Localhost</b>.</p>";
            }
        }, 10000);
    </script>
</body>
</html>
