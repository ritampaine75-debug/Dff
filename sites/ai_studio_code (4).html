<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Face Recognition</title>
    <!-- Load face-api.js from CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root {
            --primary-blue: #007bff;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            position: relative;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid var(--primary-blue);
            object-fit: cover;
            background-color: #ddd;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Webcam Section */
        .webcam-container {
            position: relative;
            display: flex;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }

        video {
            display: block;
            border-radius: 15px;
            /* Mirror the video feed for a more natural feel */
            transform: scaleX(-1);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            /* Mirror the canvas drawing to match mirrored video */
            transform: scaleX(-1);
        }

        .status {
            margin-top: 15px;
            font-weight: bold;
            color: var(--primary-blue);
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="profile-container">
            <!-- 
                 IMAGE INSTRUCTIONS: 
                 Paste your image URL or local file path (e.g., "my-photo.jpg") 
                 into the 'src' attribute below. 
            -->
            <img src="https://via.placeholder.com/200" alt="Profile" class="profile-img">
        </div>
        <h1>YOUR NAME</h1>
    </header>

    <div class="webcam-container">
        <video id="video" width="720" height="560" autoplay muted playsinline></video>
    </div>
    
    <div id="status" class="status">Loading AI Models...</div>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');
        const MY_NAME = "YOUR NAME"; // The label for the detected face

        // Load models from the official weights repository
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';

        async function init() {
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                
                statusText.innerText = "Models Loaded. Starting Webcam...";
                startVideo();
            } catch (err) {
                statusText.innerText = "Error loading models: " + err;
                console.error(err);
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                    statusText.innerText = "AI Active: Detecting Face...";
                })
                .catch(err => {
                    statusText.innerText = "Webcam Error: " + err;
                    console.error(err);
                });
        }

        video.addEventListener('play', () => {
            // Create a canvas from the video element
            const canvas = faceapi.createCanvasFromMedia(video);
            document.querySelector('.webcam-container').append(canvas);
            
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                // Detect faces using the TinyFaceDetector for performance
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks();

                // Resize detections to match the video display size
                const resizedDetections = faceapi.resizeResults(detections, displaySize);

                // Clear canvas for the next frame
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                // Draw each detection box with custom styling
                resizedDetections.forEach(detection => {
                    const box = detection.detection.box;
                    const drawBox = new faceapi.draw.DrawBox(box, { 
                        label: MY_NAME, 
                        boxColor: 'blue',
                        lineWidth: 3
                    });
                    drawBox.draw(canvas);
                });
            }, 100); // Run every 100ms
        });

        // Start the application
        init();
    </script>
</body>
</html>
