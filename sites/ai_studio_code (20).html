<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Scanner</title>
    <!-- HTML5 QR Code Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #333; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 8px; text-align: center; width: 100%; max-width: 500px; }
        #reader { width: 100%; }
        #message { margin-top: 20px; font-size: 20px; font-weight: bold; padding: 15px; border-radius: 5px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Scan QR for Attendance</h2>
    <div id="reader"></div>
    <div id="message"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, get, child, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDUHXK7NYeM6CLNN4fsyGVz1MpIVpJuOq0",
      authDomain: "studio-vddd5.firebaseapp.com",
      databaseURL: "https://studio-vddd5-default-rtdb.firebaseio.com",
      projectId: "studio-vddd5",
      storageBucket: "studio-vddd5.firebasestorage.app",
      messagingSenderId: "679230106233",
      appId: "1:679230106233:web:3d6a91cabc2264e15902a8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let isProcessing = false; // Prevent scanning the same code multiple times rapidly

    function showMessage(text, isSuccess) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = text;
        msgDiv.className = isSuccess ? 'success' : 'error';
        msgDiv.style.display = 'block';
        setTimeout(() => { msgDiv.style.display = 'none'; }, 4000);
    }

    function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;

        const dbRef = ref(db);
        // Check if the QR code belongs to a registered student
        get(child(dbRef, `students/${decodedText}`)).then((snapshot) => {
            if (snapshot.exists()) {
                const studentData = snapshot.val();
                const today = new Date().toISOString().split('T')[0];
                const currentTime = new Date().toLocaleTimeString();

                // Save attendance record
                set(ref(db, `attendance/${today}/${decodedText}`), {
                    name: studentData.name,
                    time: currentTime
                }).then(() => {
                    showMessage(`Attendance Successful: ${studentData.name}`, true);
                    setTimeout(() => { isProcessing = false; }, 3000); // Wait 3 seconds before next scan
                });

            } else {
                showMessage("Invalid QR Code! Student not found.", false);
                setTimeout(() => { isProcessing = false; }, 3000);
            }
        }).catch((error) => {
            console.error(error);
            isProcessing = false;
        });
    }

    // Initialize Camera Scanner
    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", { fps: 10, qrbox: {width: 250, height: 250} }, false
    );
    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
