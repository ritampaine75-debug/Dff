<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberFace AI | Advanced Biometric Suite</title>
    <!-- CDN Dependencies -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00d2ff;
            --cyber-blue: #0072ff;
            --dark-bg: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --error-red: #ff4b2b;
            --success-green: #00f260;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: #fff;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. Header & Profile Section */
        .app-header {
            text-align: center;
            padding: 40px 0;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,210,255,0.1), transparent);
        }

        .profile-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* IMAGE INSTRUCTIONS: Replace URL below with your photo path */
            border: 5px solid var(--cyber-blue);
            object-fit: cover;
            box-shadow: 0 0 30px rgba(0, 114, 255, 0.5);
        }

        .profile-img[src=""] { background: #333; }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 4px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 2. Main Layout */
        .container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            max-width: 1200px;
            width: 95%;
            margin-bottom: 50px;
        }

        /* 3. Webcam Display */
        .video-panel {
            position: relative;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #video {
            width: 100%;
            height: auto;
            border-radius: 15px;
            transform: scaleX(-1);
        }

        canvas {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            transform: scaleX(-1);
        }

        /* 4. Controls Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--cyber-blue);
        }

        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #888; }
        .stat-value { font-size: 1.1rem; font-weight: bold; margin-top: 5px; color: var(--neon-blue); }

        .control-btn {
            background: var(--cyber-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .control-btn:hover { background: var(--neon-blue); transform: translateY(-2px); }

        /* 5. Diagnostics Console */
        .console {
            grid-column: 1 / -1;
            background: #000;
            font-family: 'Courier New', monospace;
            padding: 15px;
            height: 120px;
            overflow-y: auto;
            border-radius: 10px;
            border: 1px solid #333;
            font-size: 0.85rem;
            color: var(--success-green);
        }

        /* 6. Loading Overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: var(--dark-bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .error-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--error-red);
            padding: 15px 25px;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="loader"></div>
        <div id="load-status">Initializing Neural Networks...</div>
    </div>

    <header class="app-header">
        <div class="profile-wrapper">
            <!-- PASTE IMAGE PATH BELOW -->
            <img src="https://via.placeholder.com/160" alt="YOUR NAME" class="profile-img">
        </div>
        <h1>YOUR NAME</h1>
    </header>

    <main class="container">
        <section class="video-panel">
            <video id="video" autoplay muted playsinline></video>
        </section>

        <aside class="sidebar">
            <div class="stat-card">
                <div class="stat-label">System Status</div>
                <div id="ai-status" class="stat-value">Booting...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Identity Detected</div>
                <div id="detected-name" class="stat-value">Searching...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Current Emotion</div>
                <div id="emotion-val" class="stat-value">None</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Age / Gender</div>
                <div id="age-gender" class="stat-value">--</div>
            </div>
            
            <button class="control-btn" onclick="takeSnapshot()">CAPTURE SNAPSHOT</button>
            <button class="control-btn" style="background: #444;" onclick="location.reload()">RESTART ENGINE</button>
        </aside>

        <div id="console" class="console">
            > System initialization started...<br>
        </div>
    </main>

    <div id="error-toast" class="error-toast"></div>

    <script>
        /** 
         * POWERFUL ERROR HANDLING SYSTEM
         */
        window.onerror = function(msg, url, line) {
            logConsole(`CRITICAL ERROR: ${msg} (Line: ${line})`, 'red');
            showError(`System Failure: ${msg}`);
            return false;
        };

        const video = document.getElementById('video');
        const consoleEl = document.getElementById('console');
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';

        // 1. Feature: Log to Custom UI Console
        function logConsole(msg, color = '#00f260') {
            const entry = document.createElement('div');
            entry.style.color = color;
            entry.innerHTML = `> ${new Date().toLocaleTimeString()}: ${msg}`;
            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // 2. Feature: Visual Error Feedback
        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 5000);
        }

        // 3. Feature: Robust Model Loading
        async function loadModels() {
            try {
                logConsole("Loading Neural Models from CDN...");
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
                    faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
                ]);
                logConsole("All Models Optimized and Ready.", "#00d2ff");
                document.getElementById('overlay').style.display = 'none';
                startWebcam();
            } catch (err) {
                logConsole("Model Load Failed. Check Internet connection.", "red");
                showError("Neural Network Load Failure.");
            }
        }

        // 4. Feature: Self-Healing Camera Logic
        async function startWebcam() {
            logConsole("Requesting Media Access...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: "user"
                    } 
                });
                video.srcObject = stream;
                document.getElementById('ai-status').innerText = "ENGINE ACTIVE";
            } catch (err) {
                logConsole("Camera Access Denied or Missing.", "red");
                showError("Camera Error: Please allow permissions.");
            }
        }

        // 5. Feature: Advanced Recognition Loop
        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.querySelector('.video-panel').append(canvas);
            
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            logConsole("Recognition Loop Started.");

            setInterval(async () => {
                // Feature: Comprehensive Face Detection
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceExpressions()
                    .withAgeAndGender();

                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                if (resizedDetections.length > 0) {
                    const det = resizedDetections[0];
                    document.getElementById('detected-name').innerText = "YOUR NAME"; // Placeholder logic
                    
                    // Feature: Real-time Emotion tracking
                    const expressions = det.expressions;
                    const topExpression = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                    document.getElementById('emotion-val').innerText = topExpression.toUpperCase();
                    
                    // Feature: Age/Gender Estimation
                    const age = Math.round(det.age);
                    const gender = det.gender;
                    document.getElementById('age-gender').innerText = `${gender.toUpperCase()} / ~${age}`;

                    // Feature: Custom Professional Styling for Boxes
                    resizedDetections.forEach(detection => {
                        const box = detection.detection.box;
                        const drawBox = new faceapi.draw.DrawBox(box, { 
                            label: `IDENTITY VERIFIED: YOUR NAME`, 
                            boxColor: '#00d2ff',
                            lineWidth: 2
                        });
                        drawBox.draw(canvas);
                        
                        // Draw Landmarks (dots)
                        faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);
                    });
                } else {
                    document.getElementById('detected-name').innerText = "Searching...";
                    document.getElementById('emotion-val').innerText = "None";
                }
            }, 100);
        });

        // 6. Feature: Snapshot Capability
        function takeSnapshot() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            const link = document.createElement('a');
            link.download = `CyberFace_Capture_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            logConsole("Snapshot Saved to local disk.");
        }

        // Initial Start
        loadModels();

    </script>
</body>
</html>
